<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Voorraad | Bus vol Bikes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1>Bus vol Bikes</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/voorraad">Voorraad</a>
      </nav>
    </div>
  </header>
  <main class="wrap voorraad-page">
    <div class="stats-bar">
      <span id="count">Fietsen laden...</span>
      <span id="updated"></span>
    </div>
    <div class="filters">
      <button class="filter active" data-type="all">Alle fietsen</button>
      <button class="filter" data-type="used">Gebruikt</button>
      <button class="filter" data-type="new">Nieuw</button>
    </div>
    <div id="grid" class="grid">
      <div class="loading">🚲 Fietsen worden geladen...</div>
    </div>
  </main>
  <script src="/voorraad.js"></script>
</body>
</html>
