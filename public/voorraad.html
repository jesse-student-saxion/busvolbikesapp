<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voorraad | Bus vol Bikes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div>
        <span class="eyebrow">Bus vol Bikes</span>
        <h1>Onze actuele voorraad</h1>
      </div>
      <div class="stats">
        <div id="countBox">Laden...</div>
        <div id="updateBox"></div>
      </div>
    </section>

    <section class="filters">
      <button class="filter active" data-type="all">Alles</button>
      <button class="filter" data-type="used">Gebruikt</button>
      <button class="filter" data-type="new">Nieuw</button>
    </section>

    <section id="grid" class="grid-state loading">Fietsen laden...</section>
  </main>
  <script src="/voorraad.js"></script>
</body>
</html>
