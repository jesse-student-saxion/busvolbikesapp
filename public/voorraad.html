<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus vol Bikes voorraad</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-card">
        <span class="eyebrow">Voorraad</span>
        <h1>Onze actuele fietsen.</h1>
        <p>Nieuwe en gebruikte fietsen, automatisch geladen. Afbeeldingen gebruiken nu direct het stabiele detail-image patroon van Fietsenwijk en worden overal even groot weergegeven.</p>
      </div>
      <aside class="panel">
        <div class="links">
          <a href="/api/fietsen">JSON API</a>
          <a href="/api/fietsen.xml">XML feed</a>
          <a href="/api/health">Health check</a>
        </div>
      </aside>
    </section>

    <div class="toolbar">
      <div class="filters">
        <button class="filter active" data-type="all">Alles</button>
        <button class="filter" data-type="used">Gebruikt</button>
        <button class="filter" data-type="new">Nieuw</button>
      </div>
      <div id="status">Fietsen laden...</div>
    </div>

    <div id="grid" class="grid">
      <div class="empty">Fietsen laden...</div>
    </div>
  </div>
  <script src="/voorraad.js"></script>
</body>
</html>
