<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voorraad | Bus vol Bikes</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="page-head">
      <div>
        <span class="eyebrow">Fietsenoverzicht</span>
        <h1>Actuele voorraad</h1>
        <p>Nieuwe en gebruikte fietsen uit de Fietsenwijk-detailpagina's.</p>
      </div>
      <div class="toolbar">
        <button class="filter active" data-filter="all">Alles</button>
        <button class="filter" data-filter="used">Gebruikt</button>
        <button class="filter" data-filter="new">Nieuw</button>
      </div>
    </header>

    <div class="meta" id="meta">Laden...</div>
    <section class="grid" id="grid"></section>
  </main>
  <script src="/voorraad.js"></script>
</body>
</html>
